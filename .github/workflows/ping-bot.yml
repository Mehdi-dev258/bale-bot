name: Test Bale Bot Webhook

on:
  workflow_dispatch:        # اجرای دستی
  schedule:
    - cron: '*/10 * * * *'  # هر ۱۰ دقیقه تست کنه

jobs:
  test-bot:
    runs-on: ubuntu-latest
    
    steps:
    - name: Set Webhook
      run: |
        echo "🔗 Setting webhook..."
        curl -s "https://tapi.bale.ai/bot816023557:5vHkipUO5yquItXxCcvjORH6LpvJkXqxLoA/setWebhook?url=https://ae4a562f.coinsurf.pages.dev/bot"
        echo ""
        
    - name: Get Webhook Info
      run: |
        echo "📊 Webhook status:"
        curl -s "https://tapi.bale.ai/bot816023557:5vHkipUO5yquItXxCcvjORH6LpvJkXqxLoA/getWebhookInfo"
        echo ""
        
    - name: Send Test Message to Bot
      run: |
        echo "📤 Sending test message..."
        curl -s -X POST "https://ae4a562f.coinsurf.pages.dev/bot" \
          -H "Content-Type: application/json" \
          -d '{"message":{"chat":{"id":556535576},"text":"/ping","from":{"first_name":"GitHubAction"}}}'
        echo ""
        
    - name: Send Direct Message to You
      run: |
        echo "📨 Sending notification to your chat..."
        curl -s "https://tapi.bale.ai/bot816023557:5vHkipUO5yquItXxCcvjORH6LpvJkXqxLoA/sendMessage" \
          -H "Content-Type: application/json" \
          -d '{"chat_id":556535576,"text":"✅ GitHub Action: تست وب‌هوک انجام شد در '$(date)'"}'
        echo ""
        
    - name: Check Response
      run: |
        echo "✅ All tests completed!"
