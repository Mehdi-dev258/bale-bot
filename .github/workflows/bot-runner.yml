name: Bale Bot Runner
on:
  schedule:
    - cron: '*/1 * * * *'  # هر ۱ دقیقه اجرا بشه
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Run Bale Bot
        run: node bot.js
        timeout-minutes: 1  # حداکثر ۱ دقیقه اجرا بشه
        
      - name: Commit last_update.txt if changed
        if: always()
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          if [ -f "last_update.txt" ]; then
            git add last_update.txt
            if ! git diff --cached --quiet; then
              git commit -m "📝 Update offset [skip ci]"
              git pull --rebase  # جلوگیری از conflict
              git push
            fi
          fi
