name: Bale Bot Runner

on:
  schedule:
    # هر ۵ دقیقه یکبار اجرا شود
    - cron: '*/5 * * * *'
  workflow_dispatch:  # امکان اجرای دستی

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm init -y
      
      - name: Run Bale Bot
        run: node bot.js
      
      - name: Commit and push last_update.txt
        run: |
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'actions@github.com'
          git add last_update.txt
          git diff --quiet && git diff --staged --quiet || git commit -m "Update last_update.txt [skip ci]"
          git push
