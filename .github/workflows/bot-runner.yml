name: Bale Bot Runner (YouTube Downloader)
on:
  schedule:
    - cron: '*/2 * * * *'  # هر ۲ دقیقه (برای امنیت بیشتر و جلوگیری از همپوشانی)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: 🛠️ Install System Dependencies (FFmpeg & yt-dlp)
        run: |
          sudo apt-get update
          # نصب FFmpeg (برای تبدیل فرمت ویدیوها ضروری است)
          sudo apt-get install -y ffmpeg
          # نصب yt-dlp (دانلودر اصلی یوتیوب)
          pip install yt-dlp
          
      - name: 🚀 Run Bale Bot
        run: node bot.js
        timeout-minutes: 1  # حداکثر ۱ دقیقه اجرا
        
      - name: 💾 Commit last_update.txt if changed
        if: always()
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          if [ -f "last_update.txt" ]; then
            git add last_update.txt
            # اضافه کردن ستاره برای جلوگیری از خطا در صورت تغییر نکردن فایل
            git diff --cached --quiet || (
              git commit -m "📝 Update offset [skip ci]"
              git pull --rebase
              git push
            )
          fi
