name: Bale Bot Runner

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

# اضافه کردن مجوز نوشتن
permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Run Bale Bot
        run: node bot.js
      
      - name: Commit last_update.txt if changed
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          # اگر فایل تغییر کرده، commit کن
          if [ -f "last_update.txt" ]; then
            git add last_update.txt
            git diff --quiet --cached || git commit -m "📝 Update last_update.txt [skip ci]"
            git push
          fi
